<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APTIS Sentence Ordering Game</title>

<style>

body{
margin:0;
font-family: -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial;
background:linear-gradient(135deg,#4facfe,#00f2fe);
min-height:100vh;
display:flex;
justify-content:center;
align-items:flex-start;
padding:20px;
}

.card{
background:white;
width:100%;
max-width:700px;
border-radius:20px;
padding:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

h1{
font-size:22px;
margin:0 0 5px 0;
}

.subtitle{
color:#666;
font-size:14px;
margin-bottom:15px;
}

select{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
font-size:15px;
margin-bottom:15px;
}

.sentence{
padding:14px;
margin:10px 0;
background:#f1f4f8;
border-radius:12px;
font-size:15px;
cursor:grab;
transition:all .2s;
border:1px solid #e2e6ea;
}

.sentence:active{
cursor:grabbing;
transform:scale(1.02);
}

.buttons{
display:flex;
gap:10px;
margin-top:15px;
flex-wrap:wrap;
}

button{
flex:1;
padding:12px;
border:none;
border-radius:10px;
font-size:15px;
font-weight:600;
}

.check{
background:#22c55e;
color:white;
}

.shuffle{
background:#6366f1;
color:white;
}

.result{
margin-top:15px;
font-weight:600;
font-size:16px;
}

.correct{
color:#16a34a;
}

.wrong{
color:#dc2626;
}

@media (max-width:500px){

h1{
font-size:20px;
}

.sentence{
font-size:14px;
}

}

</style>
</head>

<body>

<div class="card">

<h1>APTIS Sentence Ordering</h1>
<div class="subtitle">Drag sentences into the correct order</div>

<select id="topicSelect" onchange="loadTopic()"></select>

<div id="list"></div>

<div class="buttons">
<button class="check" onclick="checkOrder()">Check Answer</button>
<button class="shuffle" onclick="shuffle()">Shuffle</button>
</div>

<div id="result" class="result"></div>

</div>

<script>

const topics={

"The first American woman in Space":[
"With the support from her parents, she went to university to study science",
"Her degree enabled her to get a place on the training course in USA",
"This is about space, and it helps Mae to become a member of a research team",
"As part of this group, she traveled to space and did a lot of experiments",
"Some of those were about growing plants and some animals in a spaceship"
],

"Music show at the park":[
"The local authority planned, sponsored, and paid for everything.",
"Because of this, it was free and five thousand people attended it.",
"Many of them arrived early and visited nearby shops while they were waiting for it to begin.",
"The staff there had a busy day, but they were able to close early and watch the famous singer perform.",
"He performed for two hours and everyone had great fun"
],

"Making films":[
"The films in the past were different from what we see today.",
"This is because the movies were black and white, and there was no sound.",
"In addition to these technical limitations, film producers also had a very low budget",
"This lack of money mostly affected actors, and they didn't earn much",
"Now things have changed, some of them have earned millions of dollars"
],

"Weekend activities":[
"It was on Saturday morning, and there was a ten-mile race for adults.",
"Sixty men and women ran in this, and Ms Kamur won with the fastest time.",
"After she received the prize, it was time for the children to play and compete.",
"These activities included playing football, jumping, and swimming, and they had lots of fun.",
"After that, all of them were hungry so they ate and drank with their parents"
],

"New cafe in town":[
"It was full of people, and the staff were working hard on their 1st day",
"Despite the crowd, they found me a nice table and brought me a menu",
"When I first look at the menu, I was disappointed since I hoped to see a variety of dishes",
"I had to choose one of those so I decided to choose the most expensive one",
"It was really good with cheese topping and I would come back to this place"
],

"History of travel":[
"In the past, only very rich people could afford to travel long distances.",
"The invention of cars and trains had changed everything and made travelling cheaper.",
"After these two means of transport, travelling becomes even easier with aeroplanes.",
"Because flying with them is so fast, more people now go abroad for holiday and business.",
"It is more convenient to travel to other part of the world due to the improvement in transports"
],

"Singer":[
"Before becoming famous at a young age, he studied art and music at high school",
"During this education, he started to perform on stage.",
"During his performances on stage, he likes to wear colorful clothes and paint his face.",
"This strange ways of dressing and his songs attracted people's attention",
"They started to follow him on social media and he is now very famous"
],

"End of term project":[
"For end of term project, you need to choose at least 2 of these",
"It needs to include relevant images and your own text about the topic",
"Then you need to use images and written work to create a presentation",
"Your presentation offer your key points and you have around 5 minutes to talk",
"After this time, other students are able to ask questions and you need to answer them"
],

"College welcoming day":[
"The day will begin at 10 a.m in the morning with a short presentation.",
"At the end of this talk, you will meet the heads of departments and teachers.",
"These staff members will give you a guided tour in the buildings and our sport facilities in small groups",
"During this visit, you will need to stay with these students until lunch break.",
"This meal will be provided on the second floor of the engineering building"
]

};

let correctOrder=[];
let sentences=[];

const list=document.getElementById("list");
const topicSelect=document.getElementById("topicSelect");

Object.keys(topics).forEach(t=>{
let option=document.createElement("option");
option.value=t;
option.textContent=t;
topicSelect.appendChild(option);
});

function shuffle(){
sentences=[...correctOrder].sort(()=>Math.random()-0.5);
render();
}

function loadTopic(){
let topic=topicSelect.value;
correctOrder=[...topics[topic]];
shuffle();
}

function render(){
list.innerHTML="";

sentences.forEach((s,i)=>{

let div=document.createElement("div");
div.className="sentence";
div.draggable=true;
div.textContent=s;
div.dataset.index=i;

 div.addEventListener("dragstart",dragStart);
 div.addEventListener("dragover",dragOver);
 div.addEventListener("drop",drop);

 list.appendChild(div);

});
}

let draggedIndex=null;

function dragStart(){
draggedIndex=this.dataset.index;
}

function dragOver(e){
e.preventDefault();
}

function drop(){
let targetIndex=this.dataset.index;
let temp=sentences[draggedIndex];

sentences.splice(draggedIndex,1);
sentences.splice(targetIndex,0,temp);

render();
}

function checkOrder(){

let correct=true;

 document.querySelectorAll('.sentence').forEach((el,i)=>{
 if(el.textContent!==correctOrder[i]) correct=false;
 });

 let result=document.getElementById("result");

 if(correct){
 result.innerText="✅ Correct!";
 result.className="result correct";
 }
 else{
 result.innerText="❌ Not correct yet. Try again!";
 result.className="result wrong";
 }

}

loadTopic();

</script>

</body>
</html>
