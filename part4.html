<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #333;
  }

  h1 {
    text-align: center;
    color: white;
    margin: 30px 0 10px;
    font-size: 32px;
    letter-spacing: 1px;
  }

  .container {
    max-width: 900px;
    margin: 20px auto;
    background: #fff;
    padding: 25px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    animation: fadeIn 0.5s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .topic-select {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    margin-bottom: 20px;
    font-size: 16px;
    transition: 0.3s;
  }

  .topic-select:focus {
    border-color: #667eea;
    outline: none;
  }

  .question {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    padding: 12px 14px;
    border-radius: 10px;
    background: #f9fafc;
    transition: 0.2s;
  }

  .question:hover {
    background: #eef2ff;
  }

  .question span {
    width: 70%;
    font-size: 15px;
  }

  .answer {
    padding: 6px 8px;
    border-radius: 8px;
    border: 1px solid #ccc;
    transition: 0.2s;
  }

  .answer:focus {
    border-color: #667eea;
    outline: none;
  }

  .btn {
    margin-top: 20px;
    padding: 12px;
    width: 100%;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #4CAF50, #43a047);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
  }

  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
  }

  .result {
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
    text-align: center;
  }

  .result.good { color: #4CAF50; }
  .result.bad { color: #f44336; }

</style>
</head>
