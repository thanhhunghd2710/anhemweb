<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Part4</title>

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #333;
  }

  h1 {
    text-align: center;
    color: white;
    margin: 30px 0 10px;
  }

  .container {
    max-width: 900px;
    margin: 20px auto;
    background: #fff;
    padding: 25px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }

  .topic-select {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    margin-bottom: 15px;
  }

  .controls {
    display:flex;
    gap:10px;
    margin-bottom:15px;
  }

  .question {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    padding: 12px;
    border-radius: 10px;
    background: #f9fafc;
    transition: 0.2s;
  }

  .question.correct { background:#e8f5e9; }
  .question.wrong { background:#ffebee; }

  .question span { width: 70%; }

  .answer {
    padding: 6px;
    border-radius: 8px;
    border: 1px solid #ccc;
  }

  .btn {
    padding: 10px;
    flex:1;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
  }

  .check-btn { background:#4CAF50; }
  .shuffle-btn { background:#ff9800; }

  .result {
    margin-top: 10px;
    font-size: 18px;
    font-weight: bold;
    text-align: center;
  }
</style>
</head>

<body>

<h1>🎯 Test Part4</h1>

<div class="container">

  <select id="topicSelect" class="topic-select">
    <option value="">-- Choose Topic --</option>
  </select>

  <div class="controls">
    <button class="btn shuffle-btn" onclick="shuffleQuestions()">🔀 Shuffle</button>
    <button class="btn check-btn" onclick="checkAnswers()">✅ Check</button>
  </div>

  <div id="questions"></div>

  <div id="result" class="result"></div>

</div>

<script>
const data = [
  {
    topic: "Topic 1: Music Festival",
    answers: ["Nadia","Cora","Alek","Farhan"],
    questions: [
      { q: "Who is disappointed with the weather?", a: "Nadia" },
      { q: "Who enjoyed the final day of the music event?", a: "Nadia" },
      { q: "Who was not impressed by the event overall?", a: "Cora" },
      { q: "Who enjoyed all the music at the event?", a: "Alek" },
      { q: "Who thought the event was expensive?", a: "Alek" },
      { q: "Who likes meeting old friends?", a: "Farhan" },
      { q: "Who thought the location was not good?", a: "Farhan" }
    ]
  },
  {
    topic: "Topic 2: Childhood Activities",
    answers: ["Odilia","Chris","Jan","Shelly"],
    questions: [
      { q: "Who enjoyed playing games with their children?", a: "Odilia" },
      { q: "Who thought traditional games were much simpler?", a: "Odilia" },
      { q: "Who enjoyed playing with other children as a child?", a: "Chris" },
      { q: "Who preferred reading books as a child?", a: "Jan" },
      { q: "Who enjoyed playing modern games?", a: "Jan" },
      { q: "Who enjoyed doing arts as a child?", a: "Shelly" },
      { q: "Who wished they could spend more time outdoors?", a: "Shelly" }
    ]
  },
  {
    topic: "Topic 3: Career",
    answers: ["When I finished school","I went straight to university","As a child","After school"],
    questions: [
      { q: "Who benefited from working for free?", a: "When I finished school" },
      { q: "Who did not want to change careers?", a: "I went straight to university" },
      { q: "Who enjoyed working when training?", a: "I went straight to university" },
      { q: "Who enjoyed doing things with their hands?", a: "As a child" },
      { q: "Who thinks their training was too long?", a: "As a child" },
      { q: "Who enjoyed flexible work environment?", a: "After school" },
      { q: "Who found it hard to get first job?", a: "After school" }
    ]
  },
  {
    topic: "Topic 4: Volunteering",
    answers: ["Boyd","Chinua","Emilia","Noah"],
    questions: [
      { q: "Who thinks volunteering is good for culture?", a: "Boyd" },
      { q: "Who thinks volunteering should help local communities?", a: "Boyd" },
      { q: "Who thinks volunteering has physical benefits?", a: "Chinua" },
      { q: "Who thinks volunteering is a good reason to travel?", a: "Chinua" },
      { q: "Who thinks volunteering can help advance a career?", a: "Emilia" },
      { q: "Who thinks volunteering is a good way to make friends?", a: "Emilia" },
      { q: "Who thinks volunteering can be helped by giving money?", a: "Noah" }
    ]
  }
];

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

const topicSelect = document.getElementById("topicSelect");
const questionsDiv = document.getElementById("questions");
let currentTopic = null;

// load topics
data.forEach((t, i) => {
  let opt = document.createElement("option");
  opt.value = i;
  opt.text = t.topic;
  topicSelect.appendChild(opt);
});

function renderQuestions() {
  questionsDiv.innerHTML = "";

  currentTopic.questions.forEach((item, index) => {
    let div = document.createElement("div");
    div.className = "question";
    div.id = "row_" + index;

    let q = document.createElement("span");
    q.innerText = item.q;

    let select = document.createElement("select");
    select.className = "answer";
    select.id = "q_" + index;

    let defaultOpt = document.createElement("option");
    defaultOpt.text = "-- Select --";
    defaultOpt.value = "";
    select.appendChild(defaultOpt);

    let options = shuffle([...currentTopic.answers]);
    options.forEach(opt => {
      let option = document.createElement("option");
      option.value = opt;
      option.text = opt;
      select.appendChild(option);
    });

    div.appendChild(q);
    div.appendChild(select);
    questionsDiv.appendChild(div);
  });
}

// change topic
topicSelect.onchange = () => {
  document.getElementById("result").innerText = "";

  if (topicSelect.value === "") return;

  currentTopic = JSON.parse(JSON.stringify(data[topicSelect.value]));
  currentTopic.questions = shuffle(currentTopic.questions);

  renderQuestions();
};

function shuffleQuestions() {
  if (!currentTopic) return;
  currentTopic.questions = shuffle(currentTopic.questions);
  renderQuestions();
}

function checkAnswers() {
  if (!currentTopic) return;

  let correct = 0;

  currentTopic.questions.forEach((item, index) => {
    let select = document.getElementById("q_" + index);
    let row = document.getElementById("row_" + index);

    row.classList.remove("correct","wrong");

    if (select.value === item.a) {
      correct++;
      row.classList.add("correct");
    } else {
      row.classList.add("wrong");
    }
  });

  document.getElementById("result").innerText = `Result: ${correct} / ${currentTopic.questions.length}`;
}
</script>

</body>
</html>
